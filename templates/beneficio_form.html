{% extends "base.html" %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-gift text-success"></i> {{ acao }} Benefício</h2>

<div class="row">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Nome <span class="text-danger">*</span></label>
            <input type="text" name="nome" class="form-control" required
                   value="{{ beneficio.nome if beneficio else '' }}"
                   placeholder="Ex.: Desconto na Conta de Água">
          </div>

          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea name="descricao" class="form-control" rows="3"
                      placeholder="Descreva o benefício oferecido...">{{ beneficio.descricao if beneficio else '' }}</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Tipo</label>
            <select name="tipo" class="form-select">
              <option value="">Selecione...</option>
              {% for tipo in ["DESCONTO", "VOUCHER", "BRINDE", "SERVICO"] %}
              <option value="{{ tipo }}"
                {% if beneficio and beneficio.tipo == tipo %}selected{% endif %}>
                {{ tipo }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Custo em Pontos <span class="text-danger">*</span></label>
            <input type="number" name="custo_pontos" class="form-control" required min="1"
                   value="{{ beneficio.custo_pontos if beneficio else '' }}"
                   placeholder="Ex.: 100">
            <div class="form-text">Quantidade de pontos necessária para resgatar este benefício.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-check-circle"></i> {{ acao }}
            </button>
            <a href="{% url 'recompensas:admin_beneficios' %}" class="btn btn-outline-secondary">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

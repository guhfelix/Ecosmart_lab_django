{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">Registrar Descarte</h2>

<div class="row">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Ponto de coleta</label>
           <select name="ponto" class="form-select" required>
              {% for ponto in pontos %}
              <option value="{{ ponto.id }}">{{ ponto.nome }} - {{ ponto.endereco }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Tipo de resíduo</label>
            <input type="text" name="tipo_residuo" class="form-control"
                   placeholder="Ex.: Eletrônico, Vidro, Papel" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Peso (kg)</label>
            <input type="number" step="0.01" min="0.01" name="peso_kg" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-success w-100">Registrar Descarte</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}

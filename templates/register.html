{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-3">Criar conta</h2>
        <form method="POST">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small">{{ field.errors }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-success w-100">Cadastrar</button>
        </form>
        <p class="mt-3 mb-0">
          Ja tem conta? <a href="{% url 'accounts:login' %}">Faca login.</a>
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock %}
